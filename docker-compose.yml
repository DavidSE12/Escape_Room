version: "3.9"

services:
  web:
    build: .
    container_name: escape-room
    ports:
      - "3000:3000"            # expose the app publicly on port 3000
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./dev.db
    volumes:
      # persist SQLite database file even if container rebuilds
      - ./dev.db:/escape-room/dev.db
    restart: always            # automatically restart if container stops or EC2 reboots
